server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: steering-hub
  datasource:
    url: jdbc:postgresql://localhost:5432/steering_hub
    username: steering
    password: steering123
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      adjust-dates-to-context-time-zone: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: true
      logic-not-delete-value: false
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

aws:
  region: us-east-1

embedding:
  dimensions: 512

# Knife4j API docs
knife4j:
  enable: true
  setting:
    language: zh_cn
  openapi:
    title: Steering Hub API
    description: AI Coding Agent 规范管理平台 API
    version: 1.0.0

health-check:
  similarity-threshold: 0.7
  sse-timeout-ms: 300000
  async-thread-pool-size: 2

logging:
  level:
    com.steeringhub: DEBUG
    com.baomidou.mybatisplus: INFO
