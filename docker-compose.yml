version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: steering-hub-db
    environment:
      POSTGRES_USER: steering
      POSTGRES_PASSWORD: steering123
      POSTGRES_DB: steering_hub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U steering -d steering_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./steering-hub-backend
      dockerfile: Dockerfile
    container_name: steering-hub-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/steering_hub
      SPRING_DATASOURCE_USERNAME: steering
      SPRING_DATASOURCE_PASSWORD: steering123
      AWS_REGION: us-east-1
      CLAUDE_CODE_USE_BEDROCK: "1"
      ANTHROPIC_MODEL: us.anthropic.claude-sonnet-4-6
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./steering-hub-frontend
      dockerfile: Dockerfile
    container_name: steering-hub-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
